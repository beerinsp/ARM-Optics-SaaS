# Supabase local development config
# Run: supabase start

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false

[functions.send-email-reminder]
verify_jwt = false

[functions.gensoft-sync]
verify_jwt = false

# Cron jobs
# Uncomment and configure after running supabase db push
# [cron]
# send_reminders = { schedule = "*/15 * * * *", function = "send-email-reminder" }
# gensoft_sync = { schedule = "0 */4 * * *", function = "gensoft-sync" }
